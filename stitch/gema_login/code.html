<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-bright": "#f5fbf1",

                        "on-primary-fixed": "#00210c",
                        "inverse-surface": "#2b322c",
                        "tertiary-container": "#d8ad00",
                        "on-surface": "#171d17",
                        "surface-dim": "#d5dcd2",
                        "surface": "#f5fbf1",
                        "secondary": "#006d3d",
                        "on-background": "#171d17",
                        "primary": "#006d36",
                        "surface-container-low": "#eff6ec",
                        "on-tertiary-fixed-variant": "#584400",

                        "surface-container-highest": "#dee4db",
                        "on-error-container": "#93000a",
                        "outline-variant": "#bdcabc",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffe08b",
                        "secondary-container": "#97f3b5",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#9af6b8",
                        "on-secondary-container": "#047240",
                        "background": "#f5fbf1",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]

            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .wood-carving-overlay {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 L60 40 L100 50 L60 60 L50 100 L40 60 L0 50 L40 40 Z' fill='%23006d36' fill-opacity='0.03'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #006d36 0%, #50c878 100%);
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<div class="relative min-h-screen flex flex-col md:flex-row items-center justify-center overflow-hidden wood-carving-overlay">
<!-- Decorative Editorial Section (Desktop Only) -->
<div class="hidden md:flex flex-1 h-screen relative bg-surface-container-low overflow-hidden items-center justify-center">
<div class="absolute inset-0 z-0 opacity-10">
<img alt="Close-up of intricate hand-carved teak wood pattern with deep textures and elegant organic curves in warm natural tones" class="w-full h-full object-cover" data-alt="Close-up of intricate hand-carved teak wood pattern with deep textures and elegant organic curves in warm natural tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbonEtoLUjV5xMsPwgYzqgBJcB9mYIN7J_wIOHRN26pobtB9cxw5pQlC9BpVA3b77ITRqBlG4-5SzlPvKAozVGpCGfkR8_QIMmqUX78HvEjgaa_NDanQesiyxWEjYI8SojadZmvbPwFPEFMhfEOzuKOFBsFkrFE36NfPdoGpzsWwjnGs7ly6W-xhrgN84iaHVk2PJjh8EnVatrjdf60c-hw2rgSLOuxArTO_JYSb8g0SxwD-oOq88Yid_CTyudpHklJiamQLOxCGjF"/>
</div>
<div class="z-10 px-16 max-w-2xl">
<h1 class="font-headline text-[4rem] font-extrabold leading-[1.1] tracking-tighter text-primary">
                    Refining<br/>Modern<br/>Mobility.
                </h1>
<p class="mt-8 text-on-surface-variant text-xl max-w-md font-medium leading-relaxed">
                    Experience the heritage of Jepara craftsmanship through a seamless digital ecosystem built for the future.
                </p>
</div>
</div>
<!-- Login Canvas -->
<main class="w-full md:w-[480px] min-h-screen md:min-h-fit flex flex-col justify-center p-8 md:p-12 z-20">
<!-- Brand Anchor -->
<header class="mb-12 flex flex-col items-center md:items-start">
<div class="editorial-gradient w-14 h-14 rounded-xl flex items-center justify-center mb-6 shadow-[0_8px_24px_rgba(0,109,54,0.15)]">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h2 class="font-headline text-3xl font-black text-on-surface tracking-tight">GEMA</h2>
<p class="text-on-surface-variant font-medium mt-1">Sign in to your global account</p>
</header>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email/Phone Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface-variant ml-1 px-1">Email or Phone</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">person</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary/40 transition-all text-on-surface placeholder:text-outline placeholder:font-medium" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-on-surface-variant ml-1">Password</label>
<a class="text-sm font-bold text-primary hover:text-secondary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-surface-container-high border-none rounded-lg focus:ring-2 focus:ring-primary/40 transition-all text-on-surface placeholder:text-outline placeholder:font-medium" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me (Optional Editorial Touch) -->
<div class="flex items-center px-1">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-low transition-all" id="remember" type="checkbox"/>
<label class="ml-3 text-sm font-medium text-on-surface-variant select-none" for="remember">Keep me logged in</label>
</div>
<!-- Actions -->
<div class="pt-4 space-y-4">
<button class="w-full editorial-gradient py-4 rounded-lg text-white font-bold text-lg shadow-[0_12px_32px_rgba(0,109,54,0.2)] hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                        Sign In
                    </button>
<div class="relative py-4 flex items-center justify-center">
<div class="absolute inset-0 flex items-center px-4">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<span class="relative bg-surface px-4 text-xs font-bold uppercase tracking-widest text-outline">or continue with</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-3 bg-surface-container-lowest border border-outline-variant/20 rounded-lg font-semibold text-on-surface hover:bg-surface-container-low transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined mr-2">google</span>
                            Google
                        </button>
<button class="flex items-center justify-center py-3 bg-surface-container-lowest border border-outline-variant/20 rounded-lg font-semibold text-on-surface hover:bg-surface-container-low transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined mr-2">ios</span>
                            Apple
                        </button>
</div>
</div>
</form>
<!-- Footer Link -->
<footer class="mt-12 text-center">
<p class="text-on-surface-variant font-medium">
                    New to GEMA? 
                    <a class="ml-1 text-primary font-bold hover:underline" href="#">Create an Account</a>
</p>
</footer>
<!-- Legal/Microcopy -->
<div class="mt-16 flex justify-center space-x-6 text-[10px] font-bold uppercase tracking-widest text-outline">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
</main>
</div>
<!-- Asymmetric Background Shapes -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[30%] h-[30%] bg-secondary-container/20 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
</body></html>
